本隱私權政策說明 [DEVELOPER NAME]（「我們」）如何在行動與網頁應用程式「LeaveMeNow」（「本應用程式」）相關情境中蒐集、使用與保護資訊。

當您下載、安裝或使用本應用程式時，即表示您（「您」或「使用者」）確認您已閱讀並理解本隱私權政策。

如果您不同意本隱私權政策，請不要使用本應用程式。

1. 我們是誰以及如何聯絡我們

應用程式名稱：「LeaveMeNow」

開發者 / 提供者：[DEVELOPER NAME]

聯絡電子郵件：[CONTACT EMAIL]

網站：[WEBSITE URL]（如有）

設立國家：Japan

我們負責依本隱私權政策所述處理個人資料。

2. 本隱私權政策的適用範圍

本隱私權政策適用於：

您對 LeaveMeNow 行動與網頁應用程式的使用；以及

任何連結至本隱私權政策的相關服務。

本隱私權政策不適用於：

您可能透過本應用程式中的連結或廣告存取的第三方網站、應用程式或服務；或

具有獨立隱私權政策的任何服務。

這些第三方應自行對其隱私實務負責。

3. 我們蒐集的資訊

在本隱私權政策發布時，本應用程式主要設計為在您的裝置上運作，僅有有限資料會傳送給我們。然而，某些資料仍可能由我們或第三方（例如應用程式商店或廣告提供者）蒐集或處理。

我們可能蒐集以下類別的資訊：

3.1 您直接提供的資訊

Forecast 輸入內容：
您為心情、情況、工作與私人生活等類別輸入的表情符號與簡短文字。

HP / MP 數值：
表示您的精力、狀態或類似情況的滑桿數值（0–100），以及您選擇在輸出中顯示/隱藏 HP/MP 的設定。

分享內容：
本應用程式根據您的輸入所產生的文字，用於複製到剪貼簿或透過系統分享面板進行分享。

重要提示：這些內容通常僅會在您的裝置上處理。當您選擇將其貼上或傳送到其他應用程式（例如社群媒體應用程式）時，將依照該應用程式的隱私權政策處理，而非依照我們的政策處理。

目前，使用本應用程式時，我們不會要求您提供姓名、電子郵件地址或帳號註冊資訊。

3.2 自動蒐集的資訊

當您使用本應用程式時，某些技術資訊可能會自動蒐集，例如：

裝置資訊（例如裝置型號、作業系統版本）；

應用程式版本；

語言與地區設定；

基本診斷資訊（例如當機記錄、效能資料），前提是您的裝置或平台已啟用此類報告。

這些資訊的一部分可能透過作業系統（iOS、Android 等）、應用程式商店（Apple App Store、Google Play）或第三方 SDK（例如廣告提供者）蒐集。我們使用這些資訊來確保本應用程式正常運作，並改善穩定性與效能。

3.3 來自第三方的資訊

我們可能從以下來源接收有限資訊：

應用程式商店（Apple App Store、Google Play）：
例如，購買（如「Remove Ads」）已完成或已恢復的資訊，以便在本應用程式中啟用相應功能。我們不會接收您的完整付款資訊。

廣告合作夥伴（例如 Google AdMob）：
其可能為了廣告與衡量目的蒐集並處理某些識別碼（例如 Advertising ID）、裝置資訊與互動資料。詳見第 6 節。

4. 我們如何使用您的資訊

我們將上述資訊用於以下目的：

提供與營運本應用程式

顯示並更新您的 forecast 輸入與 HP/MP 數值；

產生用於複製與分享的綜合文字摘要；

管理本機設定，例如是否顯示 HP/MP 長條。

處理應用程式內購

透過應用程式商店處理「Remove Ads」或其他非消耗型購買；

在相同商店帳號與平台上恢復先前購買；

在適用情況下驗證您是否享有免廣告使用資格。

顯示廣告（針對免費使用者）

在本應用程式中顯示橫幅廣告或其他廣告，除非您已購買免廣告選項；

衡量廣告成效並偵測詐欺或濫用行為（透過廣告合作夥伴）。

維護與改善本應用程式

監控當機、錯誤與效能（包括透過平台或作業系統層級的報告）；

以彙總或假名化形式了解一般使用模式，並改善可用性與穩定性。

遵守法律義務並維護我們的權利

遵守適用法律、法規及主管機關要求；

執行我們的使用條款，並保護我們、我們的使用者或第三方的權利、財產或安全。

我們不會將您的個人資料出售給第三方。

5. 處理的法律依據（適用於 EEA / UK 等地區使用者）

若您位於歐洲經濟區（EEA）、英國（UK）或其他具有類似資料保護法律的地區，我們可能依據以下一項或多項法律依據處理您的個人資料：

履行契約

當處理對於向您提供本應用程式及其功能是必要時，包括應用程式內購與權益恢復。

正當利益

當處理對於我們的正當利益是必要時，例如：

確保本應用程式的安全與穩定；

防止濫用與詐欺；

改善我們的服務。
我們始終會考量您的權利與利益，且在您的利益優先於我們利益時，不會依賴此依據。

遵守法律義務

當我們必須處理某些資料以遵守適用法律或法規時。

同意

對於某些依法需要取得同意的廣告或分析活動，我們可能透過系統對話框或第三方同意管理工具徵求您的同意。

您有權隨時撤回您的同意，且不影響撤回前基於同意進行處理的合法性。

6. 廣告與第三方服務
6.1 廣告（例如 Google AdMob）

本應用程式可能顯示第三方廣告，例如透過 Google AdMob 或類似服務。這些提供者可能蒐集並處理如下資訊：

裝置識別碼（例如 Advertising ID）；

裝置與網路資訊；

大致位置（根據 IP 位址）；

與廣告的互動（例如曝光、點擊）。

這些資訊可能用於：

投放廣告；

衡量廣告成效；

偵測詐欺與濫用；

根據您的設定與當地要求顯示個人化或非個人化廣告。

您可以透過以下方式控制某些廣告設定：

您裝置作業系統的設定（例如限制廣告追蹤 / 重設 Advertising ID）；

Google 或其他合作夥伴的帳號設定與隱私控制。

如需更多詳情，請參閱相關廣告合作夥伴的隱私權政策（例如 Google 的隱私權政策）。

僅非個人化廣告

目前，我們將廣告請求設定為僅在本應用程式中顯示非個人化廣告。這表示我們的廣告合作夥伴被要求不得使用您的過往行為、您在其他應用程式中的使用情況或其他跨應用程式追蹤資訊，來專門為您量身打造廣告。

相反地，廣告可能基於情境資訊，例如本應用程式的一般內容、根據您的 IP 位址推導出的粗略位置，以及基本技術資訊（例如裝置類型或語言設定）。這讓我們能夠透過廣告收入支持本應用程式，同時避免行為式廣告與基於興趣的個人化剖析。

即使僅使用非個人化廣告，我們的廣告合作夥伴仍可能蒐集並處理某些有限資訊，這些資訊對於投放、衡量與保護廣告是必要的，如上所述以及其自身隱私權政策中所說明。

6.2 應用程式商店與平台提供者

當您下載或更新本應用程式，或進行應用程式內購時，應用程式商店（Apple App Store、Google Play 等）可能會處理與您相關的資料。這些提供者依其自身條款與隱私權政策運作，我們無法控制。

6.3 其他第三方工具

若我們未來整合其他第三方工具（例如分析或當機回報 SDK），我們將視需要更新本隱私權政策，以說明其資料處理實務。

7. 資料儲存與保存
7.1 您裝置上的本機儲存

您的 forecast 輸入、HP/MP 數值與某些設定主要儲存在您的裝置本機。

除非未來版本中明確說明，否則我們不會例行性地將這些個人輸入內容傳輸到我們自己的伺服器。

7.2 伺服器端與商店相關資料

與應用程式內購及權益相關的資訊，可能由應用程式商店及／或我們儲存，以管理您的購買狀態（「Remove Ads」等）。

技術與記錄資料可能會在為實現本隱私權政策所述目的而合理且必要的期間內保存（例如除錯、安全、法律合規）。

除非法律要求或允許更長的保存期限，否則我們僅在達成上述目的所需期間內保存個人資料。

8. 資料共享與國際傳輸
8.1 與服務提供者及合作夥伴共享

我們可能在以下有限情況下與第三方共享個人資料：

服務提供者：
例如雲端服務提供者、分析或當機回報提供者（若有使用），但僅限於支援本應用程式所必需的範圍。

廣告合作夥伴：
例如 Google AdMob，用於顯示與衡量廣告，如第 6 節所述。

在所有情況下，我們都會將共享資料限制於合理必要的範圍內，並採取適當措施保護該等資料。

8.2 法律要求與保護

若法律要求，或我們基於善意認為該等揭露對於以下目的具有合理必要性，我們可能揭露個人資料：

遵守法律義務、法院命令或政府要求；

執行我們的使用條款；

保護我們、我們的使用者或公眾的權利、財產或安全。

8.3 國際資料傳輸

根據您的所在地以及我們服務提供者的所在地，您的個人資料可能會被傳輸至您居住國／地區以外的國家並在當地處理。這些國家／地區的資料保護法律可能與您所在國家／地區不同。

在法律要求的情況下，當個人資料發生國際傳輸時，我們將採取適當保障措施（例如契約條款）來保護您的個人資料。

9. 您的權利與選擇

根據您居住國／地區的不同，您可能享有以下部分或全部與個人資料有關的權利：

存取權——確認我們是否處理您的個人資料並存取該等資料。

更正權——要求更正不正確或不完整的個人資料。

刪除權——在某些情況下要求刪除您的個人資料。

限制處理權——在某些情況下要求我們限制對您個人資料的處理。

異議權——基於與您特定情況有關的理由，反對我們基於正當利益進行的處理。

資料可攜權——以結構化、常用且機器可讀格式接收某些個人資料，並將其傳輸給另一個控制者。

撤回同意權——當處理係基於同意時，您有權隨時撤回同意，且不影響撤回前基於同意進行處理的合法性。

申訴權——向資料保護主管機關或其他有權機關提出申訴。

若要行使您的權利，請使用第 1 節中提供的聯絡方式與我們聯絡。在回應某些請求之前，我們可能會要求您驗證身分。

由於您的許多輸入內容僅儲存在您的裝置上，因此某些權利（例如存取或刪除）可能需要由您直接透過裝置行使（例如清除本應用程式資料或解除安裝本應用程式）。

10. 兒童隱私

本應用程式並非針對 13 歲以下兒童，我們也不會故意蒐集 13 歲以下兒童的個人資料。

若我們發現自己在未取得適當同意的情況下，無意間蒐集了 13 歲以下兒童（或您所在司法管轄區數位同意年齡以下兒童）的個人資料，我們將採取合理措施盡快刪除該等資料。

若您認為我們可能蒐集了兒童的個人資料，請使用第 1 節中的聯絡方式與我們聯絡。

11. 安全性

我們採取合理且適當的技術與組織措施，以保護個人資料免於意外或非法的毀損、遺失、變更、未經授權的存取或揭露。

然而，任何傳輸或儲存方法都無法做到絕對安全。我們無法保證您的資料絕對安全。

您有責任維護您裝置的安全，並控制對本應用程式及其內容的存取。

12. 本隱私權政策的變更

我們可能不時更新本隱私權政策。當我們這樣做時，我們將修改本文頂部的「最後更新」日期。

若我們進行重大變更，我們也可能依法律要求，透過本應用程式、我們的網站或其他適當方式通知您。

在更新後的隱私權政策生效後繼續使用本應用程式，即表示您接受修訂後的政策。

13. 聯絡我們

若您對本隱私權政策或我們的資料處理實務有任何問題、疑慮或請求，請透過以下方式與我們聯絡：

Email: [CONTACT EMAIL]
Website / 聯絡頁面: [WEBSITE OR CONTACT PAGE URL]
