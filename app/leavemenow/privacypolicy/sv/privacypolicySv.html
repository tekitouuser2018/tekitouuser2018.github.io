Senast uppdaterad: 2026/04/23

Denna integritetspolicy förklarar hur Yuichi Sato (“vi”, “oss” eller “vår/vårt/våra”) samlar in, använder och skyddar information i samband med mobil- och webbapplikationen “LeaveMeNow” (“Appen”).

Genom att ladda ner, installera eller använda Appen bekräftar du (“du” eller “användare”) att du har läst och förstått denna integritetspolicy.

Om du inte godkänner denna integritetspolicy ska du inte använda Appen.

1. Vem vi är och hur du kontaktar oss

Appnamn: “LeaveMeNow”

Utvecklare / Leverantör: Yuichi Sato

Kontakt-e-post: mkrlinquiry@gmail.com

Webbplats: https://tekitouuser2018.github.io/index.html

Vi ansvarar för behandlingen av personuppgifter enligt beskrivningen i denna integritetspolicy.

2. Denna integritetspolicys omfattning

Denna integritetspolicy gäller för:

din användning av LeaveMeNow mobil- och webbapplikation; och

alla relaterade tjänster som länkar till denna integritetspolicy.

Den gäller inte för:

webbplatser, appar eller tjänster från tredje part som du kan komma åt via länkar eller annonser i Appen; eller

tjänster som har separata integritetspolicyer.

Dessa tredje parter ansvarar för sina egna integritetsrutiner.

3. Information vi samlar in

När denna integritetspolicy publiceras är Appen utformad för att huvudsakligen fungera på din enhet, med begränsad data som skickas till oss. Viss data kan dock fortfarande samlas in eller behandlas, antingen av oss eller av tredje part (såsom appbutiker eller annonsleverantörer).

Vi kan samla in följande kategorier av information:

Forecast-poster:
Emojis och kort text som du anger för kategorier såsom humör, situation, arbete och privatliv.

HP / MP-värden:
Reglagevärden (0–100) som representerar din energi, ditt tillstånd eller liknande, samt ditt val att visa/dölja HP/MP i utdata.

Delningsinnehåll:
Den text som Appen genererar från dina uppgifter för kopiering till urklippet eller delning via systemets delningsfunktion.

Appbutiker (Apple App Store, Google Play):

För att tillhandahålla och driva Appen

för att generera den kombinerade textsammanfattningen för kopiering och delning;

När behandlingen är nödvändig för att tillhandahålla Appen och dess funktioner till dig, inklusive köp i appen och återställning av rättigheter.

Berättigade intressen

När behandlingen är nödvändig för våra berättigade intressen, såsom:

Samtycke
