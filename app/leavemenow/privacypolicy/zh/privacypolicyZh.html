本隐私政策说明 [DEVELOPER NAME]（“我们”）如何在移动和网页应用程序“LeaveMeNow”（“本应用”）相关场景中收集、使用和保护信息。

如果您不同意本隐私政策，请不要使用本应用。

应用名称：“LeaveMeNow”

2. 本隐私政策的适用范围

本隐私政策适用于：

您对 LeaveMeNow 移动和网页应用程序的使用；以及

任何链接到本隐私政策的相关服务。

本隐私政策不适用于：

您可能通过本应用中的链接或广告访问的第三方网站、应用或服务；或

3. 我们收集的信息

在本隐私政策发布时，本应用主要设计为在您的设备上运行，仅有有限的数据会发送给我们。然而，某些数据仍可能由我们或第三方（例如应用商店或广告提供商）收集或处理。

我们可能收集以下类别的信息：

3.1 您直接提供的信息

Forecast 输入内容：
您为心情、情况、工作和私人生活等类别输入的表情符号和简短文本。

HP / MP 数值：
表示您的精力、状态或类似情况的滑块数值（0–100），以及您选择在输出中显示/隐藏 HP/MP 的设置。

分享内容：
本应用根据您的输入生成的文本，用于复制到剪贴板或通过系统分享面板进行分享。

设备信息（例如设备型号、操作系统版本）；

应用版本；

语言和地区设置；

基本诊断信息（例如崩溃日志、性能数据），前提是您的设备或平台启用了此类报告。

这些信息中的一部分可能通过操作系统（iOS、Android 等）、应用商店（Apple App Store、Google Play）或第三方 SDK（例如广告提供商）收集。我们使用这些信息来确保本应用正常运行，并改善稳定性和性能。

3.3 来自第三方的信息

我们可能从以下来源接收有限信息：

应用商店（Apple App Store、Google Play）：
例如，购买（如“Remove Ads”）已完成或已恢复的信息，以便在本应用中启用相应功能。我们不会接收您的完整支付详情。

提供和运营本应用

显示和更新您的 forecast 输入和 HP/MP 数值；

生成用于复制和分享的综合文本摘要；

管理本地设置，例如是否显示 HP/MP 条。

处理应用内购买

在同一商店账户和平台上恢复先前购买；

在适用情况下验证您享有免广告使用资格。

展示广告（针对免费用户）

在本应用中展示横幅广告或其他广告，除非您已购买免广告选项；

衡量广告效果并检测欺诈或滥用行为（通过广告合作伙伴）。

维护和改进本应用

监控崩溃、错误和性能（包括通过平台或操作系统级报告）；

以聚合或假名化形式了解一般使用模式，并改进可用性和稳定性。

遵守法律义务并维护我们的权利

遵守适用法律、法规和主管机关的要求；

执行我们的使用条款，并保护我们、我们的用户或第三方的权利、财产或安全。

5. 处理的法律依据（适用于 EEA / UK 等地区用户）

如果您位于欧洲经济区（EEA）、英国（UK）或其他具有类似数据保护法律的地区，我们会基于以下一种或多种法律依据处理您的个人数据：

履行合同

当处理对于向您提供本应用及其功能是必要时，包括应用内购买和权益恢复。

合法利益

当处理对于我们的合法利益是必要时，例如：

确保本应用的安全与稳定；

防止滥用和欺诈；

改进我们的服务。
我们始终会考虑您的权利和利益，并且在您的利益优先于我们的利益时，不会依赖此依据。

遵守法律义务

当我们必须处理某些数据以遵守适用法律或法规时。

同意

对于某些依法需要取得同意的广告或分析活动，我们可能会通过系统对话框或第三方同意工具征求您的同意。

您有权随时撤回您的同意，且不会影响撤回前基于同意进行处理的合法性。

6. 广告和第三方服务
6.1 广告（例如 Google AdMob）

本应用可能显示第三方广告，例如通过 Google AdMob 或类似服务。这些提供方可能会收集和处理如下信息：

设备标识符（例如 Advertising ID）；

设备和网络信息；

大致位置（基于 IP 地址）；

与广告的交互（例如展示、点击）。

这些信息可能用于：

投放广告；

衡量广告效果；

检测欺诈和滥用；

根据您的设置和当地要求显示个性化或非个性化广告。

您可以通过以下方式控制某些广告设置：

您设备操作系统的设置（例如限制广告跟踪 / 重置 Advertising ID）；

Google 或其他合作伙伴的账户设置和隐私控制。

有关更多详情，请参阅相关广告合作伙伴的隐私政策（例如 Google 的隐私政策）。

仅非个性化广告

除非法律要求或允许更长的保留期限，否则我们仅在实现上述目的所需的时间内保留个人数据。

8.1 与服务提供商和合作伙伴共享

我们可能在以下有限情况下与第三方共享个人数据：

服务提供商：

8.2 法律要求和保护

如果法律要求，或我们善意相信该等披露对于以下目的具有合理必要性，我们可能会披露个人数据：

执行我们的使用条款；

8.3 国际数据传输

根据您的所在地以及我们的服务提供商所在地，您的个人数据可能会被传输到您居住国/地区以外的国家并在那里处理。这些国家/地区的数据保护法律可能与您所在国家/地区不同。

在法律要求的情况下，当个人数据发生国际传输时，我们将采取适当保障措施（例如合同条款）来保护您的个人数据。

9. 您的权利和选择

根据您居住国/地区的不同，您可能对个人数据享有以下部分或全部权利：

删除权——在某些情况下请求删除您的个人数据。
