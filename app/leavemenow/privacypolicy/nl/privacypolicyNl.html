Wanneer de verwerking noodzakelijk is om de App en de functies ervan aan u te leveren, inclusief in-app aankopen en het herstellen van rechten.

Gerechtvaardigde belangen

Wanneer de verwerking noodzakelijk is voor onze gerechtvaardigde belangen, zoals:

het voorkomen van misbruik en fraude;

het verbeteren van onze diensten.

Naleving van wettelijke verplichtingen

Toestemming
